<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Image Slides</title>

<style>
/* =========================
   RESET & BASE STYLES
========================= */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body{
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000;
}

/* =========================
   SLIDER CONTAINER
========================= */
.slider{
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* =========================
   SLIDES TRACK
========================= */
.slides{
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.9s cubic-bezier(0.7, 0, 0.3, 1); /* Ultra-smooth pacing */
}

/* =========================
   SINGLE SLIDE
========================= */
.slide{
    min-width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
}

/* =========================
   KEN BURNS ZOOM EFFECT
========================= */
.slide img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transform: scale(1);
    transition: transform 10s ease-out; /* Slow visual build */
}

/* Triggers subtle background zoom only on active slide */
.slide.active img {
    transform: scale(1.08);
}

/* =========================
   CINEMATIC CAPTIONS
========================= */
.caption{
    position: absolute;
    left: 8%;
    bottom: 12%;
    color: #fff;
    z-index: 5;
    max-width: 700px;
}

/* Text elements hide out of view first */
.caption h2, .caption p{
    opacity: 0;
    transform: translateY(30px);
    transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.8s ease;
    text-shadow: 0 4px 12px rgba(0,0,0,0.5); /* Replaces overlay for crisp readability */
}

.caption h2{
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -1px;
}

/* Stagger animation delays for elements sliding up */
.slide.active .caption h2 {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 0.4s;
}

/* =========================
   MINIMALIST NAVIGATION BUTTONS
========================= */
.btn{
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 55px;
    height: 55px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn:hover{
    background: #fff;
    color: #000;
    border-color: #fff;
    transform: translateY(-50%) scale(1.05);
}

.prev{ left: 30px; }
.next{ right: 30px; }

/* =========================
   SMOOTH LIQUID DOTS
========================= */
.dots{
    position: absolute;
    bottom: 35px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 20;
}

.dot{
    width: 10px;
    height: 10px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.35);
    cursor: pointer;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
}

/* Modern Pill stretch instead of basic scale */
.dot.active{
    background: #fff;
    width: 30px; 
}

/* =========================
   RESPONSIVE DESIGN
========================= */
@media(max-width: 768px){
    .btn{
        width: 44px;
        height: 44px;
        font-size: 1rem;
    }
    .prev{ left: 15px; }
    .next{ right: 15px; }
    .caption{ left: 5%; bottom: 15%; max-width: 90%; }
    .dots{ bottom: 25px; }
}
</style>
</head>
<body>

<div class="slider" id="slider">

    <!-- NAVIGATION BUTTONS -->
    <button class="btn prev" aria-label="Previous Slide">&#10094;</button>
    <button class="btn next" aria-label="Next Slide">&#10095;</button>

    <!-- SLIDES TRACK -->
    <div class="slides" id="slides">

            <img src="https://i.ibb.co/sJpppRcS/c766426dc0a29a39c2d80a026cf46ecd-uncropped-scaled-within-1536-1152.webp" alt="Bathroom 2">

        </div>

        <div class="slide">
            <img src="https://i.ibb.co/3mTF0j9R/60271743187aa758cb646430103efe58-uncropped-scaled-within-1536-1152.webp" alt="Bathroom 2">

                <h2>Bathroom 2</h2>

        </div>

    </div>

    <!-- DOTS NAVIGATION container -->
    <div class="dots" id="dots"></div>

</div>

<script>
/* =========================
   ELEMENT SELECTORS
========================= */
const slidesTrack = document.getElementById('slides');
const allSlides = document.querySelectorAll('.slide');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');
const dotsContainer = document.getElementById('dots');
const sliderContainer = document.getElementById('slider');

let currentIndex = 0;
let autoSlideInterval;
const totalSlidesCount = allSlides.length;

/* =========================
   DYNAMICS DOT GENERATION
========================= */
for(let i = 0; i < totalSlidesCount; i++){
    const dotElement = document.createElement('div');
    dotElement.classList.add('dot');
    if(i === 0) dotElement.classList.add('active');

    dotElement.addEventListener('click', () => {
        currentIndex = i;
        updateSliderView();
        resetAutoSlideTimer();
    });
    dotsContainer.appendChild(dotElement);
}

const allDots = document.querySelectorAll('.dot');

/* =========================
   SLIDER RENDER ENGINE
========================= */
function updateSliderView(){
    // Shift track
    slidesTrack.style.transform = `translateX(-${currentIndex * 100}%)`;

    // Handle structural active state switching
    allSlides.forEach((slideSlide, idx) => {
        if(idx === currentIndex) {
            slideSlide.classList.add('active');
        } else {
            slideSlide.classList.remove('active');
        }
    });

    // Handle navigation dots active states
    allDots.forEach(dot => dot.classList.remove('active'));
    allDots[currentIndex].classList.add('active');
}

/* =========================
   NAVIGATION FUNCTIONS
========================= */
function loadNextSlide(){
    currentIndex++;
    if(currentIndex >= totalSlidesCount) currentIndex = 0;
    updateSliderView();
}

function loadPrevSlide(){
    currentIndex--;
    if(currentIndex < 0) currentIndex = totalSlidesCount - 1;
    updateSliderView();
}

/* =========================
   EVENT ATTACHMENTS
========================= */
nextBtn.addEventListener('click', () => { loadNextSlide(); resetAutoSlideTimer(); });
prevBtn.addEventListener('click', () => { loadPrevSlide(); resetAutoSlideTimer(); });

/* =========================
   AUTOMATION MANAGEMENT
========================= */
function kickstartAutoCycle(){
    autoSlideInterval = setInterval(loadNextSlide, 8000); // Set to 8s loop for premium pacing
}

function haltAutoCycle(){
    clearInterval(autoSlideInterval);
}

function resetAutoSlideTimer(){
    haltAutoCycle();
    kickstartAutoCycle();
}

// Initial script ignition
kickstartAutoCycle();

/* =========================
   INTERACTION PAUSE HOOKS
========================= */
sliderContainer.addEventListener('mouseenter', haltAutoCycle);
sliderContainer.addEventListener('mouseleave', kickstartAutoCycle);

/* =========================
   MOBILE TOUCH INTEGRATION
========================= */
let startPointX = 0;
let endPointX = 0;

sliderContainer.addEventListener('touchstart', event => {
    startPointX = event.changedTouches[0].screenX;
    haltAutoCycle();
}, {passive: true});

sliderContainer.addEventListener('touchend', event => {
    endPointX = event.changedTouches[0].screenX;
    processSwipeMetrics();
    kickstartAutoCycle();
}, {passive: true});

function processSwipeMetrics(){
    const thresholdOffset = 60;
    if(startPointX - endPointX > thresholdOffset) loadNextSlide();
    if(endPointX - startPointX > thresholdOffset) loadPrevSlide();
}
</script>
